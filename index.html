// ── AUTH / IDENTITY ──
// Students never see "email" — this just gives Firebase Auth a stable identity
// derived from their name, so security rules can tell students apart without
// requiring a real inbox. Admin uses one real Firebase Auth account.
const keyOf=name=>name.trim().toLowerCase().replace(/\s+/g,"_").replace(/[^a-z0-9_]/g,"");
const pseudoEmail=key=>`${key}@${EMAIL_DOMAIN}`;
const derivePassword=pin=>`yv-${pin}-9k2qz`; // Firebase requires 6+ chars; PIN alone is 4

let session={idToken:null,refreshToken:null,expiresAt:0,uid:null,email:null};
const setSession=d=>{session={idToken:d.idToken,refreshToken:d.refreshToken,expiresAt:Date.now()+Number(d.expiresIn)*1000-60000,uid:d.localId,email:d.email};};
const clearSession=()=>{session={idToken:null,refreshToken:null,expiresAt:0,uid:null,email:null};};
const authRequest=async(path,body)=>{
  const r=await fetch(`${IDENTITY_URL}/accounts:${path}?key=${FIREBASE_API_KEY}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  const d=await r.json();
  if(!r.ok)throw new Error(d?.error?.message||"AUTH_ERROR");
  return d;
};
const authSignUp=(email,password)=>authRequest("signUp",{email,password,returnSecureToken:true});
const authSignIn=(email,password)=>authRequest("signInWithPassword",{email,password,returnSecureToken:true});
const authRefresh=async()=>{
  if(!session.refreshToken)return null;
  try{
    const r=await fetch(`${REFRESH_URL}?key=${FIREBASE_API_KEY}`,{method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},body:`grant_type=refresh_token&refresh_token=${session.refreshToken}`});
    const d=await r.json();
    if(!r.ok)return null;
    session={...session,idToken:d.id_token,refreshToken:d.refresh_token,expiresAt:Date.now()+Number(d.expires_in)*1000-60000};
    return session.idToken;
  }catch{return null;}
};
const getToken=async()=>{if(session.idToken&&Date.now()<session.expiresAt)return session.idToken;return await authRefresh();};

const pad=n=>String(n).padStart(2,"0");
const fmtDate=iso=>{if(!iso)return"";const d=new Date(iso);return`${pad(d.getDate())} / ${pad(d.getMonth()+1)} / ${d.getFullYear()}`;};
const fmtDT=iso=>{if(!iso)return"";const d=new Date(iso);return`${fmtDate(iso)}, ${pad(d.getHours())}:${pad(d.getMinutes())}`;};
const todayISO=()=>new Date().toISOString().split("T")[0];
const mkLesson=n=>({id:n,lessonNumber:n,title:`Lesson ${n}`,reading:"",summary:"",quiz:{mcQuestions:[],reflections:[]},resources:[],readingReleased:false,readingScheduledDate:null,readingReleaseDate:null,summaryReleased:false,summaryScheduledDate:null,summaryReleaseDate:null,quizReleased:false,quizScheduledDate:null,quizReleaseDate:null,resourcesReleased:false,readingMins:5});
const lessonStatus=l=>{if(l.readingReleased&&l.summaryReleased&&l.quizReleased)return"Released";if(l.readingReleased)return"Reading Live";if(l.readingScheduledDate||l.summaryScheduledDate)return"Scheduled";return"Draft";};

const rtUrl=async p=>{const t=await getToken();return `${RTDB_URL}/${p}.json${t?`?auth=${t}`:""}`;};
const rtGet=async p=>{try{const r=await fetch(await rtUrl(p));if(!r.ok)return null;return await r.json();}catch{return null;}};
const rtSet=async(p,d)=>{try{const r=await fetch(await rtUrl(p),{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(d)});return r.ok;}catch{return false;}};
const rtGetAll=async p=>{try{const r=await fetch(await rtUrl(p));if(!r.ok)return[];const d=await r.json();return d?Object.values(d):[];}catch{return[];}};
const rtDel=async p=>{try{const r=await fetch(await rtUrl(p),{method:"DELETE"});return r.ok;}catch{return false;}};
// Note: rtGet/rtSet above already omit the auth param when there's no session yet,
// so they work fine for the public settings nodes (whitelist/courseLocked/registeredNames)
// before a student or admin has signed in.

// canWrite=true only for admin: students can read lessons but the "auto release by
// scheduled date" write-back is an admin-only action under the new rules anyway.
const loadLessons=async(canWrite=false)=>{
  const results=await Promise.all(Array.from({length:20},(_,i)=>rtGet(`lessons/${i+1}`)));
  let lessons=results.map((l,i)=>l||mkLesson(i+1));
  const today=todayISO();let changed=false;
  lessons=lessons.map(l=>{let u={...l};
    if(!u.readingReleased&&u.readingScheduledDate&&u.readingScheduledDate<=today){u={...u,readingReleased:true,readingReleaseDate:fmtDate(u.readingScheduledDate+"T00:00:00")};changed=true;}
    if(!u.summaryReleased&&u.summaryScheduledDate&&u.summaryScheduledDate<=today){u={...u,summaryReleased:true,summaryReleaseDate:fmtDate(u.summaryScheduledDate+"T00:00:00")};changed=true;}
    if(!u.quizReleased&&u.quizScheduledDate&&u.quizScheduledDate<=today){u={...u,quizReleased:true,quizReleaseDate:fmtDate(u.quizScheduledDate+"T00:00:00")};changed=true;}
    return u;});
  if(changed&&canWrite)await Promise.all(lessons.map(l=>rtSet(`lessons/${l.id}`,l)));
  return lessons;
};
const saveLesson=l=>rtSet(`lessons/${l.id}`,l);

// quizResponses and feedback are now keyed by Firebase Auth uid so security rules
// can restrict each student to their own data. studentName/lessonId are still
// stored inside each record for display, so existing UI code needs no changes.
const saveResponse=(uid,e)=>rtSet(`quizResponses/${uid}/${e.lessonId}`,{...e,uid});
const loadMyResponses=async uid=>{const d=await rtGet(`quizResponses/${uid}`);return d?Object.values(d):[];};
const loadAllResponses=async registeredMap=>{
  const uids=Object.values(registeredMap||{});
  const chunks=await Promise.all(uids.map(uid=>rtGet(`quizResponses/${uid}`)));
  return chunks.flatMap(c=>c?Object.values(c):[]);
};
const saveFeedback=(uid,lessonId,fb)=>rtSet(`feedback/${uid}/${lessonId}`,fb);
const loadMyFeedback=async uid=>{const d=await rtGet(`feedback/${uid}`);return d?Object.values(d):[];};
const loadAllFeedback=async registeredMap=>{
  const uids=Object.values(registeredMap||{});
  const chunks=await Promise.all(uids.map(uid=>rtGet(`feedback/${uid}`)));
  return chunks.flatMap(c=>c?Object.values(c):[]);
};

// Public settings (readable pre-login so the welcome screen can check the whitelist).
// "registeredNames" maps a student's name-key -> their Firebase Auth uid, and replaces
// the old plaintext-PIN "settings/students" node entirely.
const loadPublicSettings=async()=>{
  const[whitelist,courseLocked,registeredNames]=await Promise.all([rtGet("settings/whitelist"),rtGet("settings/courseLocked"),rtGet("settings/registeredNames")]);
  return{whitelist:whitelist||[],courseLocked:!!courseLocked,registeredNames:registeredNames||{}};
};
const saveWhitelistAndLock=async s=>{await Promise.all([rtSet("settings/whitelist",s.whitelist||[]),rtSet("settings/courseLocked",!!s.courseLocked)]);return true;};
const registerName=(key,uid)=>rtSet(`settings/registeredNames/${key}`,uid);
// Legacy (pre-migration) plaintext-PIN store — admin-only, used once by the migration tool.
const loadLegacyStudents=()=>rtGet("settings/students");
const deleteLegacyStudents=()=>rtDel("settings/students");

const RichEditor=({value,onChange,placeholder})=>{
  const ref=useRef(null);const[imgUrl,setImgUrl]=useState("");const[showImg,setShowImg]=useState(false);const mounted=useRef(false);
  useEffect(()=>{if(!mounted.current&&ref.current){ref.current.innerHTML=value||"";mounted.current=true;}},[]);
  const exec=(cmd,val=null)=>{document.execCommand(cmd,false,val);ref.current?.focus();};
  const tb={padding:"5px 8px",borderRadius:6,border:`1px solid ${B.sage}`,background:"white",cursor:"pointer",color:B.adminDark,fontSize:13};
  return(<div style={{border:`1px solid ${B.sage}`,borderRadius:10,overflow:"hidden"}}>
    <div style={{display:"flex",flexWrap:"wrap",gap:4,padding:"7px 10px",background:"#f5f2ec",borderBottom:`1px solid ${B.sage}`}}>
      <button style={tb} onMouseDown={e=>{e.preventDefault();exec("formatBlock","H2")}}>H2</button>
      <button style={tb} onMouseDown={e=>{e.preventDefault();exec("formatBlock","H3")}}>H3</button>
      <button style={tb} onMouseDown={e=>{e.preventDefault();exec("bold")}}><b>B</b></button>
      <button style={tb} onMouseDown={e=>{e.preventDefault();exec("italic")}}><i>I</i></button>
      <button style={tb} onMouseDown={e=>{e.preventDefault();exec("insertUnorderedList")}}>• List</button>

// ── ONE-TIME SECURITY MIGRATION ──
// Moves students created under the old plaintext-PIN system onto real Firebase Auth
// accounts, and moves their quizResponses/feedback from the old name-based keys to
// the new uid-based paths. Must be run by admin BEFORE the locked-down rules are
// pasted into the Firebase console (it needs the old permissive rules to still be
// active, since it reads/writes across every student's data).
const runMigration=async(legacyStudents,onProgress)=>{
  const entries=Object.entries(legacyStudents||{});
  const results=[];
  for(const[oldKey,rec] of entries){
    const name=rec.name||oldKey.replace(/_/g," ");
    const k=keyOf(name);const pin=rec.pinHash;
    let uid=null;
    try{
      const d=await authSignUp(pseudoEmail(k),derivePassword(pin));
      uid=d.localId;
    }catch(e){
      if(String(e.message).includes("EMAIL_EXISTS")){
        try{const d2=await authSignIn(pseudoEmail(k),derivePassword(pin));uid=d2.localId;}
        catch(e2){results.push({name,ok:false,error:"Account exists under a different PIN — needs manual fix"});onProgress&&onProgress(results.length,entries.length,name);continue;}
      }else{results.push({name,ok:false,error:e.message});onProgress&&onProgress(results.length,entries.length,name);continue;}
    }
    await registerName(k,uid);
    await Promise.all(Array.from({length:20},async(_,i)=>{
      const lessonId=i+1;
      const oldResp=await rtGet(`quizResponses/${lessonId}_${oldKey}`);
      if(oldResp){await rtSet(`quizResponses/${uid}/${lessonId}`,{...oldResp,uid});await rtDel(`quizResponses/${lessonId}_${oldKey}`);}
      const oldFb=await rtGet(`feedback/${lessonId}_${oldKey}`);
      if(oldFb){await rtSet(`feedback/${uid}/${lessonId}`,{...oldFb,uid});await rtDel(`feedback/${lessonId}_${oldKey}`);}
    }));
    results.push({name,ok:true});
    onProgress&&onProgress(results.length,entries.length,name);
  }
  if(results.every(r=>r.ok))await deleteLegacyStudents();
  return results;
};

const MigrationPanel=({legacyStudents,onDone})=>{
  const[running,setRunning]=useState(false);const[log,setLog]=useState([]);const[done,setDone]=useState(false);
  const count=Object.keys(legacyStudents||{}).length;
  if(count===0)return null;
  const run=async()=>{setRunning(true);setLog([]);const results=await runMigration(legacyStudents,(i,total,name)=>setLog(p=>[...p,`${i}/${total} — ${name}`]));setRunning(false);setDone(true);onDone&&onDone(results);};
  return(<div style={{background:"#fff8e6",border:`1.5px solid ${B.gold}`,borderRadius:12,padding:"14px 15px",marginBottom:14}}>
    <div style={{fontWeight:700,fontSize:13,color:"#8a6800",marginBottom:6}}>⚠ One-Time Security Migration</div>
    <div style={{fontSize:12,color:B.adminDark,lineHeight:1.6,marginBottom:10}}>Found {count} student{count!==1?"s":""} still on the old login system. Run this once — and only while the Firebase rules are still the old (open) ones, before you paste in the new locked-down rules.</div>
    {!done&&<button onClick={run} disabled={running} style={{width:"100%",padding:"11px",borderRadius:9,background:running?"#888":B.red,color:"white",border:"none",fontSize:13,fontWeight:600,cursor:running?"wait":"pointer"}}>{running?"Migrating…":`Migrate ${count} student${count!==1?"s":""}`}</button>}
    {log.length>0&&<div style={{marginTop:10,maxHeight:140,overflow:"auto",fontSize:11,color:B.purple,fontFamily:"monospace"}}>{log.map((l,i)=><div key={i}>{l}</div>)}</div>}
    {done&&<div style={{marginTop:8,fontSize:12,color:B.green,fontWeight:600}}>Migration complete. You can now paste the new rules into Firebase.</div>}
  </div>);
};

// ── FEEDBACK WRITER ──

const LessonView=({lesson,studentName,responses,feedback,onSubmitQuiz,readOnly=false})=>{
  const existing=responses.find(r=>r.lessonId===lesson.id&&r.studentName===studentName);
  const[mcA,setMcA]=useState(existing?.mcAnswers||[]);
  const[reflT,setReflT]=useState(existing?.reflections||(lesson.quiz?.reflections||[]).map(()=>""));
  const[submitted,setSubmitted]=useState(!!existing);
  const[submitting,setSubmitting]=useState(false);
  const[showAllQ,setShowAllQ]=useState(false);const[showAllR,setShowAllR]=useState(false);
  const mcQs=lesson.quiz?.mcQuestions||[];const rfPs=lesson.quiz?.reflections||[];
  const score=submitted?mcQs.reduce((s,q,i)=>s+(mcA[i]===q.correct?1:0),0):null;
  const myFb=feedback.find(f=>f.lessonId===lesson.id&&f.studentName===studentName);
  const showSum=readOnly||lesson.summaryReleased;const showQ=readOnly||lesson.quizReleased;
  const submit=async()=>{if(mcQs.length>0&&mcA.length<mcQs.length){alert("Please answer all questions.");return;}setSubmitting(true);const sc=mcQs.reduce((s,q,i)=>s+(mcA[i]===q.correct?1:0),0);await onSubmitQuiz({lessonId:lesson.id,studentName,submittedAt:new Date().toISOString(),mcAnswers:mcA,score:sc,reflections:reflT});setSubmitting(false);setSubmitted(true);};
  const RP=({i,q})=>{const sel=mcA[i]??null;const opts=q.options.map((opt,j)=>{const iC=j===q.correct,iS=j===sel;let bg="white",border=`1px solid ${B.sage}`;if(submitted){if(iC){bg="#f0faf0";border=`1px solid #A39C0F30`;}if(iS&&!iC){bg="#fff0f0";border=`1px solid #C0392B25`;}}else if(iS){bg="rgba(163,156,15,0.1)";border=`1px solid ${B.green}`;}
    return(<div key={j} onClick={()=>{if(!submitted&&!readOnly){const a=[...mcA];a[i]=j;setMcA(a);}}} style={{display:"flex",alignItems:"center",gap:7,borderRadius:8,padding:"7px 10px",marginBottom:4,border,background:bg,cursor:submitted||readOnly?"default":"pointer"}}>
      {submitted?(iC?<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#A39C0F" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>:iS?<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#C0392B" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>:<div style={{width:10,height:10,borderRadius:"50%",border:"1.5px solid #C5BBCE",flexShrink:0}}/>):<div style={{width:10,height:10,borderRadius:"50%",border:`1.5px solid ${iS?B.green:"#C5BBCE"}`,background:iS?"rgba(163,156,15,0.3)":"none",flexShrink:0}}/>}
      <span style={{fontFamily:"'EB Garamond',serif",fontSize:13.5,fontWeight:submitted&&iC?600:400,color:submitted&&iS&&!iC?"#C0392B":submitted&&iC?B.darkPurple:"#5B4969"}}>{opt}</span>
      {submitted&&iS&&!iC&&<span style={{fontSize:8,color:"#C0392B",marginLeft:2}}>your answer</span>}
    </div>);});
    return(<div style={{marginBottom:12}}><div style={{fontSize:12,color:B.darkPurple,fontWeight:500,marginBottom:6,lineHeight:1.4}}>{i+1}. {q.question}</div>{opts}</div>);};

  return(<div style={{padding:"18px 16px 40px",fontFamily:"'EB Garamond',serif"}} className="fade-in">
    {myFb&&<div style={{background:`linear-gradient(135deg,${B.darkPurple},#7B6B8A)`,borderRadius:12,padding:"11px 13px",marginBottom:14,display:"flex",alignItems:"center",justifyContent:"center",gap:9,textAlign:"center"}}>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.85)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      <div><div style={{fontSize:11,fontWeight:600,color:"white",marginBottom:2}}>Your teacher has left feedback</div><div style={{fontSize:10,color:"rgba(255,255,255,0.65)"}}>Lesson {lesson.lessonNumber} — {lesson.title}</div></div>
    </div>}
    <SL c={`Lesson ${lesson.lessonNumber} · Pre-Class Reading`}/>

    <Div/><SL c="Session Summary"/>
    {showSum?lesson.summary?<div style={{background:"rgba(163,156,15,0.07)",borderRadius:12,padding:"16px 18px",border:`1px solid ${B.sage}30`}}><div className="prose-reading" dangerouslySetInnerHTML={{__html:lesson.summary}}/></div>:<p style={{color:B.sage,fontStyle:"italic",fontSize:15}}>Summary not yet available.</p>

// ── WELCOME + PIN ──
const WelcomeScreen=({settings,onEnter})=>{
  const[step,setStep]=useState("name");
  const[first,setFirst]=useState("");const[surname,setSurname]=useState("");
  const[pin,setPin]=useState("");const[confirm,setConfirm]=useState("");
  const[err,setErr]=useState("");const[loading,setLoading]=useState(false);
  const full=`${first.trim()} ${surname.trim()}`.trim();const ready=first.trim()&&surname.trim();
  const key=keyOf(full);
  const inp={width:"100%",padding:"13px 14px",borderRadius:10,border:`1px solid ${B.sage}`,fontSize:16,fontFamily:"'EB Garamond',serif",boxSizing:"border-box",background:"white",marginBottom:11,outline:"none"};
  const handleName=async()=>{if(!ready)return;setLoading(true);
    const alreadyRegistered=!!(settings.registeredNames||{})[key];
    if(alreadyRegistered){setStep("returning");setLoading(false);return;}
    const wl=settings.whitelist||[];const onList=wl.some(n=>n.toLowerCase()===full.toLowerCase());
    if(!onList){setErr("Your name is not on the approved list. Please check with your teacher.");setLoading(false);return;}
    if(settings.courseLocked){setErr("Registration is currently closed. Please contact your teacher.");setLoading(false);return;}
    setErr("");setStep("pin");setLoading(false);};
  const handlePin=async()=>{
    if(pin.length!==4||!/^\d{4}$/.test(pin)){setErr("Please enter a 4-digit PIN.");return;}
    if(pin!==confirm){setErr("PINs do not match.");return;}
    setLoading(true);setErr("");
    try{
      const d=await authSignUp(pseudoEmail(key),derivePassword(pin));
      setSession(d);
      await registerName(key,d.localId);
      setLoading(false);onEnter(full);
    }catch(e){
      setLoading(false);
      if(String(e.message).includes("EMAIL_EXISTS")){setErr("This name is already registered. Please go back and use 'Not you?' to sign in instead.");}
      else{setErr("Could not set up your account. Please check your connection and try again.");}
    }};
  const handleReturn=async()=>{
    setLoading(true);setErr("");
    try{
      const d=await authSignIn(pseudoEmail(key),derivePassword(pin));
      setSession(d);
      setLoading(false);onEnter(full);
    }catch(e){
      setLoading(false);
      setErr("Incorrect PIN.");
    }};
  return(<div style={{minHeight:"100vh",background:B.linen,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
    <div style={{width:"100%",maxWidth:390,background:"white",borderRadius:20,padding:30,boxShadow:"0 4px 22px rgba(91,73,105,0.11)",textAlign:"center"}}>
      <div style={{display:"flex",justifyContent:"center",marginBottom:14}}><LotusImg size={56} float/></div>
      <div style={{fontFamily:"'EB Garamond',serif",fontSize:18,fontWeight:600,color:B.darkPurple,marginBottom:12,lineHeight:1.2}}>Yoga Vana Forest Academy</div>
      {step==="name"&&<>
        <h2 style={{color:B.darkPurple,fontSize:24,margin:"0 0 8px",fontFamily:"'EB Garamond',serif",fontWeight:500,fontStyle:"italic"}}>namaste !</h2>
        <div style={{width:36,height:1.5,background:`linear-gradient(to right,transparent,${B.gold},transparent)`,margin:"10px auto 18px"}}/>
        <p style={{color:B.purple,fontSize:16,marginBottom:24,lineHeight:1.65,fontFamily:"'EB Garamond',serif"}}>Please enter your name so your teacher can recognise your work.</p>
        <input value={first} onChange={e=>setFirst(e.target.value)} placeholder="First name…" style={inp}/>
        <input value={surname} onChange={e=>setSurname(e.target.value)} placeholder="Surname…" onKeyDown={e=>e.key==="Enter"&&ready&&handleName()} style={{...inp,marginBottom:0}}/>
        {err&&<div style={{color:B.red,fontSize:12,marginTop:8,textAlign:"center"}}>{err}</div>}
        <button onClick={handleName} disabled={!ready||loading} style={{width:"100%",marginTop:18,padding:"14px",borderRadius:12,background:ready?B.darkPurple:"#c5bfa8",color:"white",border:"none",fontSize:14,fontFamily:"DM Sans,sans-serif",fontWeight:400,letterSpacing:"0.6px",cursor:ready?"pointer":"default"}}>{loading?"Checking…":"Continue"}</button>
      </>}
      {step==="pin"&&<>
        <h2 style={{color:B.darkPurple,fontSize:22,margin:"0 0 8px",fontFamily:"'EB Garamond',serif",fontWeight:500}}>Create your PIN</h2>
        <div style={{width:36,height:1.5,background:`linear-gradient(to right,transparent,${B.gold},transparent)`,margin:"10px auto 18px"}}/>
        <p style={{color:B.purple,fontSize:15,marginBottom:24,lineHeight:1.65,fontFamily:"'EB Garamond',serif"}}>Choose a 4-digit PIN only you know. You will use it every time you log in.</p>
        <input type="password" inputMode="numeric" maxLength={4} value={pin} onChange={e=>setPin(e.target.value.replace(/\D/g,""))} placeholder="4-digit PIN" style={{...inp,textAlign:"center",letterSpacing:8,fontSize:20}}/>
        <input type="password" inputMode="numeric" maxLength={4} value={confirm} onChange={e=>setConfirm(e.target.value.replace(/\D/g,""))} placeholder="Confirm PIN" style={{...inp,textAlign:"center",letterSpacing:8,fontSize:20,marginBottom:0}}/>
        {err&&<div style={{color:B.red,fontSize:12,marginTop:8,textAlign:"center"}}>{err}</div>}
        <button onClick={handlePin} disabled={loading} style={{width:"100%",marginTop:18,padding:"14px",borderRadius:12,background:B.darkPurple,color:"white",border:"none",fontSize:14,fontFamily:"DM Sans,sans-serif",fontWeight:400,letterSpacing:"0.6px",cursor:"pointer"}}>{loading?"Setting up…":"Step Into Your Practice"}</button>
      </>}
      {step==="returning"&&<>
        <h2 style={{color:B.darkPurple,fontSize:22,margin:"0 0 8px",fontFamily:"'EB Garamond',serif",fontWeight:500}}>Welcome back</h2>
        <div style={{width:36,height:1.5,background:`linear-gradient(to right,transparent,${B.gold},transparent)`,margin:"10px auto 18px"}}/>
        <p style={{color:B.purple,fontSize:15,marginBottom:6,lineHeight:1.65,fontFamily:"'EB Garamond',serif",fontStyle:"italic"}}>{full}</p>
        <p style={{color:B.purple,fontSize:14,marginBottom:18,lineHeight:1.65,fontFamily:"'EB Garamond',serif"}}>Enter your PIN to continue.</p>
        <input type="password" inputMode="numeric" maxLength={4} value={pin} onChange={e=>setPin(e.target.value.replace(/\D/g,""))} onKeyDown={e=>e.key==="Enter"&&handleReturn()} placeholder="Your PIN" style={{...inp,textAlign:"center",letterSpacing:8,fontSize:20,marginBottom:0}}/>
        {err&&<div style={{color:B.red,fontSize:12,marginTop:8,textAlign:"center"}}>{err}</div>}
        <button onClick={handleReturn} disabled={loading} style={{width:"100%",marginTop:18,padding:"14px",borderRadius:12,background:B.darkPurple,color:"white",border:"none",fontSize:14,fontFamily:"DM Sans,sans-serif",fontWeight:400,letterSpacing:"0.6px",cursor:"pointer"}}>{loading?"Checking…":"Step Into Your Practice"}</button>
        <button onClick={()=>{setStep("name");setFirst("");setSurname("");setPin("");setErr("");}} style={{width:"100%",marginTop:10,padding:"10px",borderRadius:12,background:"none",color:B.purple,border:`1px solid #C5BBCE`,fontSize:13,cursor:"pointer"}}>Not you? Go back</button>
      </>}
      <div style={{marginTop:26}}><CurvedLogo width={140} opacity={0.48}/></div>
    </div>
  </div>);
};

// ── LOGIN ──
const LoginScreen=({onStudent,onAdmin})=>{
  const[pw,setPw]=useState("");const[err,setErr]=useState("");
  const[taps,setTaps]=useState(0);const[showAdmin,setShow]=useState(false);
  const[aEmail,setAEmail]=useState("");const[aPw,setAPw]=useState("");const[aErr,setAErr]=useState("");const[aLoading,setALoading]=useState(false);
  const timer=useRef(null);
  const tap=()=>setTaps(c=>{const n=c+1;clearTimeout(timer.current);timer.current=setTimeout(()=>setTaps(0),1500);if(n>=7){setShow(true);return 0;}return n;});
  const tryS=()=>pw===STUDENT_PASSWORD?(setErr(""),onStudent()):setErr("Incorrect password. Please try again.");
  const tryA=async()=>{
    setALoading(true);setAErr("");
    try{
      const d=await authSignIn(aEmail.trim(),aPw);
      if((d.email||"").toLowerCase()!==ADMIN_EMAIL.toLowerCase()){setAErr("This account is not authorised as admin.");setALoading(false);return;}
      setSession(d);setALoading(false);onAdmin();
    }catch(e){setALoading(false);setAErr("Invalid credentials.");}
  };
  return(<div style={{minHeight:"100vh",background:B.linen,display:"flex",flexDirection:"column",overflowX:"hidden"}}>
    <div style={{background:"linear-gradient(170deg,#3d2e4a 0%,#5B4969 55%,#7B6B8A 100%)",padding:"50px 26px 32px",textAlign:"center",position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",top:-80,left:-80,width:280,height:280,borderRadius:"50%",background:"rgba(255,255,255,0.03)",pointerEvents:"none"}}/>
      <div style={{position:"absolute",bottom:-60,right:-60,width:220,height:220,borderRadius:"50%",background:"rgba(255,255,255,0.04)",pointerEvents:"none"}}/>
      <div onClick={tap} style={{display:"flex",justifyContent:"center",marginBottom:20,cursor:"default",userSelect:"none"}}><LotusImg size={84} float/></div>
      <div className="fade-up-d1" style={{fontSize:"9.5px",letterSpacing:"3.5px",textTransform:"uppercase",fontWeight:400,color:"rgba(255,255,255,0.42)",marginBottom:12}}>Welcome to</div>
      <div className="fade-up-d1"><h1 style={{fontFamily:"'EB Garamond',serif",fontSize:33,fontWeight:500,color:"white",lineHeight:1.15,margin:"0 0 6px"}}>Yoga Vana<br/>Forest Academy</h1></div>
      <div className="fade-up-d2" style={{display:"flex",justifyContent:"center",margin:"13px 0"}}><div style={{width:44,height:"1.5px",background:`linear-gradient(to right,transparent,${B.gold},transparent)`}}/></div>
      <div className="fade-up-d2">
        <p style={{fontFamily:"'EB Garamond',serif",fontStyle:"italic",fontSize:15,color:"rgba(255,255,255,0.62)",lineHeight:1.65,maxWidth:290,margin:"0 auto 6px"}}><span style={{fontStyle:"normal",fontWeight:600}}>BYC</span> – 200 Hour Yoga Teacher Training</p>
        <div style={{fontSize:"8.5px",letterSpacing:"2.5px",textTransform:"uppercase",color:"rgba(255,255,255,0.35)",marginBottom:18,fontWeight:400}}>Yoga Philosophy</div>
      </div>
      <div className="fade-up-d3" style={{display:"flex",justifyContent:"center",borderTop:"1px solid rgba(255,255,255,0.1)",paddingTop:16}}>
        {[{I:IBook,l:"Read"},{I:IHeart,l:"Reflect"},{I:({stroke,size})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={stroke} strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="3.5" r="1.5"/><path d="M8 9c0 0 1.5-1.5 4-1.5s4 1.5 4 1.5"/><path d="M5 12c2 0 3.5 1 7 1s5-1 7-1"/><path d="M7 12l-1.5 5h13L17 12"/></svg>,l:"Apply"}].map((item,i,arr)=>(
          <div key={item.l} style={{flex:1,textAlign:"center",padding:"6px 4px",borderRight:i<arr.length-1?"1px solid rgba(255,255,255,0.12)":"none"}}>
            <div style={{display:"flex",justifyContent:"center",marginBottom:5}}><item.I stroke="rgba(255,255,255,0.7)" size={17}/></div>
            <div style={{fontSize:"8px",letterSpacing:"2px",textTransform:"uppercase",fontWeight:500,color:"rgba(255,255,255,0.45)"}}>{item.l}</div>
          </div>
        ))}
      </div>
    </div>
    <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",padding:"28px 22px 32px"}}>
      <div style={{width:"100%",maxWidth:380}} className="fade-up-d4">
        <div style={{background:"white",borderRadius:20,padding:"26px 22px",boxShadow:"0 8px 32px rgba(91,73,105,0.10)"}}>
          <div style={{fontSize:"10px",letterSpacing:"3px",textTransform:"uppercase",color:B.purple,fontWeight:500,marginBottom:18,textAlign:"center"}}>Student Access</div>
          <input type="password" value={pw} placeholder="Enter your password" onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&tryS()} className="pw-input"/>
          {err&&<div style={{color:B.red,fontSize:12,marginTop:8,textAlign:"center"}}>{err}</div>}
          <button onClick={tryS} className="btn-primary" style={{marginTop:16}}>Step Into Your Practice</button>
        </div>
        {showAdmin&&<div style={{marginTop:14,background:"white",borderRadius:18,padding:"20px 22px",border:`1px solid rgba(138,112,153,0.2)`,boxShadow:"0 4px 16px rgba(91,73,105,0.08)"}}>
          <div style={{fontSize:"9.5px",color:B.sage,marginBottom:14,textAlign:"center",letterSpacing:"3px",textTransform:"uppercase"}}>Administration</div>
          <input type="email" value={aEmail} placeholder="Admin email" onChange={e=>setAEmail(e.target.value)} className="pw-input" style={{marginBottom:10}}/>
          <input type="password" value={aPw} placeholder="Admin password" onChange={e=>setAPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&tryA()} className="pw-input"/>
          {aErr&&<div style={{color:B.red,fontSize:12,marginTop:8,textAlign:"center"}}>{aErr}</div>}
          <button onClick={tryA} disabled={aLoading} style={{width:"100%",marginTop:14,padding:"13px",borderRadius:12,background:B.adminDark,color:"white",border:"none",fontSize:13,fontWeight:400,cursor:"pointer",letterSpacing:"0.5px"}}>{aLoading?"Signing in…":"Sign In"}</button>
        </div>}
        <div style={{marginTop:24,textAlign:"center"}}><CurvedLogo width={150} opacity={0.5}/></div>
      </div>
    </div>
  </div>);
};

// ── ROOT ──
function App(){
  const[role,setRole]=useState(null);const[student,setStudent]=useState(null);const[uid,setUid]=useState(null);
  const[lessons,setLessons]=useState(null);const[responses,setResponses]=useState([]);
  const[feedback,setFeedback]=useState([]);const[settings,setSettings]=useState(null);
  const[legacyStudents,setLegacyStudents]=useState(null);
  const[loading,setLoading]=useState(true);const[error,setError]=useState(null);

  // Public settings only — safe to load before anyone signs in (needed for the welcome screen).
  const loadPublic=useCallback(async()=>{setLoading(true);setError(null);try{setSettings(await loadPublicSettings());}catch(e){setError("Could not connect to Firebase. Please check your internet connection.");}finally{setLoading(false);}},[]);
  useEffect(()=>{loadPublic();},[]);

  // Runs once a student is signed in — only ever fetches THEIR OWN data.
  const loadStudentData=useCallback(async theUid=>{setLoading(true);setError(null);try{const[ls,rs,fb]=await Promise.all([loadLessons(false),loadMyResponses(theUid),loadMyFeedback(theUid)]);setLessons(ls);setResponses(rs);setFeedback(fb);}catch(e){setError("Could not load your lessons. Please check your connection.");}finally{setLoading(false);}},[]);

  // Runs once admin is signed in — fetches everything, including the (soon to be deleted) legacy PIN store.
  const loadAdminData=useCallback(async()=>{setLoading(true);setError(null);try{
    const pub=await loadPublicSettings();setSettings(pub);
    const[ls,legacy]=await Promise.all([loadLessons(true),loadLegacyStudents()]);
    setLessons(ls);setLegacyStudents(legacy);
    const[rs,fb]=await Promise.all([loadAllResponses(pub.registeredNames),loadAllFeedback(pub.registeredNames)]);
    setResponses(rs);setFeedback(fb);
  }catch(e){setError("Could not connect to Firebase. Please check your internet connection.");}finally{setLoading(false);}},[]);

  const onSaveLesson=useCallback(async upd=>{const ok=await saveLesson(upd);if(ok)setLessons(prev=>prev.map(l=>l.id===upd.id?upd:l));return ok;},[]);
  const onSubmitQuiz=useCallback(async entry=>{const full={...entry,uid};const ok=await saveResponse(uid,full);if(ok)setResponses(prev=>[...prev.filter(r=>r.lessonId!==entry.lessonId),full]);},[uid]);
  const onSaveSettings=useCallback(async s=>{await saveWhitelistAndLock(s);setSettings(p=>({...p,whitelist:s.whitelist,courseLocked:s.courseLocked}));},[]);

  const enterStudent=name=>{const theUid=session.uid;setStudent(name);setUid(theUid);setRole("student");loadStudentData(theUid);};
  const enterAdmin=()=>{setUid(session.uid);setRole("admin");loadAdminData();};
  const retry=role==="admin"?loadAdminData:role==="student"?()=>loadStudentData(uid):loadPublic;

  if(loading)return(<div style={{minHeight:"100vh",background:B.linen,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}><LotusImg size={60} float/><span style={{color:B.purple,fontSize:14,letterSpacing:1}}>Connecting…</span></div>);
  if(error)return(<div style={{minHeight:"100vh",background:B.linen,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16,padding:24}}><LotusImg size={60}/><p style={{color:B.red,fontSize:14,textAlign:"center",maxWidth:300}}>{error}</p><button onClick={retry} style={{padding:"10px 24px",borderRadius:10,background:B.green,color:"white",border:"none",fontSize:14,cursor:"pointer"}}>Retry</button></div>);
  return(<>
    {!role&&<LoginScreen onStudent={()=>setRole("welcome")} onAdmin={enterAdmin}/>}
    {role==="welcome"&&settings&&<WelcomeScreen settings={settings} onEnter={enterStudent}/>}
    {role==="student"&&lessons&&<StudentDashboard studentName={student} lessons={lessons} responses={responses} feedback={feedback} onSubmitQuiz={onSubmitQuiz}/>}
    {role==="admin"&&lessons&&<AdminDashboard lessons={lessons} responses={responses} feedback={feedback} settings={settings} legacyStudents={legacyStudents} onSaveLesson={onSaveLesson} onSaveSettings={onSaveSettings} onRefresh={loadAdminData} onMigrated={loadAdminData}/>}
  </>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
